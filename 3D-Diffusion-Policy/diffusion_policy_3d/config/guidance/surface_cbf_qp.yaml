surface_cbf_qp_guidance:
  enabled: false
  num_candidates: 32
  candidate_inference_steps: null

  pybullet:
    robot_surface_points_per_link:
      pen_link: 80
      wrist_3_link: 16

  runner:
    guidance_steps: 3
    max_risk_segments: 6
    window_radius: 5
    points_per_segment: 5
    min_constraints_per_segment: 6
    active_constraints: 32
    check_steps: 32
    cert_steps: 64
    cert_swept_intermediate: 3
    d_safe: 0.005
    d_trigger: 0.005
    d_cert: 0.001
    eps_deep: 0.03
    delta_max: 0.05
    scp_iterations: 2
    delta_max_total: 0.05
    delta_max_pass1: 0.025
    delta_max_pass2: 0.025
    d_trigger_pass2_offset: 0.005
    margin_buffer: 0.005
    enable_local_waypoint_qp_after_certificate: true
    local_waypoint_qp_window_radius: 2
    local_waypoint_qp_max_collision_segments: 2
    local_waypoint_qp_min_clearance_trigger: -0.01
    local_waypoint_qp_target_buffer: 0.005
    local_waypoint_qp_lambda_s: 0.25
    local_waypoint_qp_delta_max: 0.02
    local_waypoint_qp_max_velocity_step: 0.2
    local_waypoint_qp_max_acceleration_step: 0.4
    local_waypoint_qp_maxiter: 100
    lambda_s: 0.25
    rho: 1.0e5
    ddim_eta: 0.0
    joint_limit_steps: 32
    guidance_targets:
      - -0.02
      - 0.0
    fallback_to_terminal_cbf: true
