defaults:
  - task: realdex_transition_cspace
  - _self_

name: train_simple_dp3_cspace

gpu_dataset: false  # set true to preload all data to GPU
task_name: ${task.name}
shape_meta: ${task.shape_meta}
exp_name: "simple_dp3_cspace"

horizon: 10
n_obs_steps: 1
n_action_steps: 10
n_latency_steps: 0
dataset_obs_steps: ${n_obs_steps}
keypoint_visible_rate: 1.0
obs_as_global_cond: true

policy:
  _target_: diffusion_policy_3d.policy.dp3_cspace.SimpleDP3CSpace
  use_point_crop: true
  condition_type: film
  use_down_condition: true
  use_mid_condition: true
  use_up_condition: true
  diffusion_step_embed_dim: 64
  down_dims: [64, 128]
  crop_shape: [80, 80]
  encoder_output_dim: 64
  encoder_dropout_prob: 0.1
  state_mlp_size: [32, 32]
  horizon: ${horizon}
  kernel_size: 5
  n_action_steps: ${n_action_steps}
  n_groups: 8
  n_obs_steps: ${n_obs_steps}
  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddim.DDIMScheduler
    num_train_timesteps: 100
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    clip_sample: true
    set_alpha_to_one: true
    steps_offset: 0
    prediction_type: sample
  num_inference_steps: 10
  obs_as_global_cond: true
  shape_meta: ${shape_meta}
  action_loss_mask_indices: [5]
  use_pc_color: false
  pointnet_type: pointnet
  pointcloud_encoder_cfg:
    in_channels: 3
    out_channels: ${policy.encoder_output_dim}
    use_layernorm: true
    final_norm: layernorm
    normal_channel: false
  cspace_feature_key: cspace_feature
  cspace_in_dim: 2
  cspace_hidden_dim: 64
  cspace_output_dim: 64
  fusion_output_dim: 256
  trajectory_loss:
    enabled: true
    stats_path: /root/autodl-tmp/3D-Diffusion-Policy/data/realdex_bspline_stats_free10.npz
    jobs_sdf_root: /root/weld-robot/data_generation/data/generated_jobs
    simple_sdf_root: /root/weld-robot/data_generation/data/generated_jobs/simple_jobs
    simple_workpiece_id_offset: 1000
    job_name_template: job_{workpiece_id:03d}
    sdf_filename: workpiece_sdf.npz
    urdf_path: config/robot-model/ur5e_with_pen.urdf
    urdf_package_roots: [config/robot-model]
    num_control_points: 16
    trajectory_steps: 32
    link_surface_point_counts:
      wrist_2_link: 64
      wrist_3_link: 96
      pen_link: 128
    topk: 32
    softmin_beta: 75.0
    d_safe: 0.001
    sdf_collision_weight: 0.2
    trajectory_collision_weight: 0.3
    smooth_weight: 0.01
    sdf_out_of_bounds_distance_m: 1.0
    query_chunk_size: 262144
    cpu_cache_size: 32
    gpu_cache_size: 8

ema:
  _target_: diffusion_policy_3d.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

dataloader:
  batch_size: 64
  num_workers: 8
  shuffle: true
  pin_memory: true
  persistent_workers: true

val_dataloader:
  batch_size: 64
  num_workers: 8
  shuffle: false
  pin_memory: true
  persistent_workers: true

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-4
  betas: [0.95, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-4

training:
  device: "cuda:0"
  seed: 42
  debug: false
  resume: false
  run_validation: true
  lr_scheduler: cosine
  lr_warmup_steps: 500
  num_epochs: 300
  gradient_accumulate_every: 1
  use_ema: true
  rollout_every: 200
  checkpoint_every: 50
  val_every: 1
  sample_every: 5
  max_train_steps: null
  max_val_steps: null
  tqdm_interval_sec: 1.0
  compile: false  # torch.compile model for GPU speedup
  performance:
    tf32: true
    amp:
      enabled: true
      dtype: bf16
  early_stop:
    enabled: true
    monitor_key: val_loss
    mode: min
    patience: 50
    min_delta: 1.0e-4
    warmup_epochs: 20
  pybullet_eval:
    enabled: True
    stats_path: /root/autodl-tmp/3D-Diffusion-Policy/data/realdex_bspline_stats_free10.npz
    stats_mode: auto
    include_regular_jobs: true
    include_simple_jobs: true
    jobs_root: /root/weld-robot/data_generation/data/generated_jobs
    simple_jobs_root: /root/weld-robot/data_generation/data/generated_jobs/simple_jobs
    simple_workpiece_id_offset: 1000
    job_name_template: job_{workpiece_id:03d}
    workpiece_filename: workpiece.stl
    urdf_path: null
    urdf_package_roots: [config/robot-model]
    tcp_link_name: tool0
    stl_x_offset_m: 0.5
    collision_distance_threshold: 0.0
    interpolate_for_collision: true
    max_joint_step_rad: 0.01
    min_interpolated_steps_per_segment: 1
    goal_position_norm_m: 0.1
    goal_tolerance_m: 0.01
    num_control_points: 16
    spline_degree: 5
    target_steps: 64
    max_episodes: null
    sdf_filename: workpiece_sdf.npz
    sdf_required: true
    robot_surface_points_per_link: 256
    sdf_out_of_bounds_value_m: null
    log_legacy_pybullet_metrics: true
    progress_mininterval_sec: 1.0
    num_workers: 1
    inference_batch_size: 32
    worker_start_method: spawn
    worker_chunksize: 1

logging:
  group: ${exp_name}
  id: null
  mode: online
  name: ${training.seed}
  project: dp3
  resume: false
  tags:
    - simple_dp3
    - cspace

checkpoint:
  save_ckpt: true
  generalization_gap:
    enabled: true
    target: 0.2
    tolerance: 0.02
    window: 3
    dirname: generalization_gap_checkpoints
  topk:
    monitor_key: val_loss
    mode: min
    k: 3
    format_str: 'epoch={epoch:04d}-val_loss={val_loss:.6f}.ckpt'
  save_last_ckpt: true
  save_last_snapshot: false

multi_run:
  run_dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  sweep:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
    subdir: ${hydra.job.num}
