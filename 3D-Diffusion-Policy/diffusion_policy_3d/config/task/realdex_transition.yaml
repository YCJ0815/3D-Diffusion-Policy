name: realdex_transition

task_name: transition

shape_meta: &shape_meta
  obs:
    point_cloud:
      shape: [1024, 3]
      type: point_cloud
    goal_position:
      shape: [3]
      type: low_dim
    goal_direction:
      shape: [6]
      type: low_dim
    first_joint_angles_normalized:
      shape: [6]
      type: low_dim
    last_joint_angles_normalized:
      shape: [6]
      type: low_dim
  action:
    shape: [6]

env_runner: null

dataset:
  _target_: diffusion_policy_3d.dataset.transition_dataset.TransitionTrajectoryDataset
  zarr_path: data/realdex_transition.zarr
  horizon: ${horizon}
  pad_before: 0
  pad_after: 0
  seed: 42
  val_ratio: 0.1
  train_workpiece_ids: [
    0, 1, 2, 3, 4, 5, 6, 7,
    1000, 1001, 1002, 1003, 1004, 1005, 1006, 1007, 1008, 1009,
    1010, 1011, 1012, 1013, 1014, 1015, 1016, 1017, 1018, 1019,
    1020, 1021, 1022, 1023, 1024, 1025, 1026, 1027, 1028, 1029,
    1030, 1031, 1032, 1033, 1034, 1035, 1036, 1037, 1038, 1039,
    1040, 1041, 1042, 1043, 1044, 1045, 1046, 1047, 1048, 1049,
    1050, 1051, 1052, 1053, 1054, 1055, 1056, 1057, 1058, 1059
  ]
  val_workpiece_ids: [8, 9, 1060, 1061, 1062, 1063, 1064]
  max_train_episodes: null
  point_cloud_key: point_cloud
  obs_keys:
    - point_cloud
    - goal_position
    - goal_direction
    - first_joint_angles_normalized
    - last_joint_angles_normalized
